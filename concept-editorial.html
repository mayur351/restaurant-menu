<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Third Place Brew - Editorial</title>
  <style>
    :root { --paper:#f7f3ea; --ink:#161616; --muted:#6f6a61; --line:#cfc7b8; --deep:#111; }
    *{box-sizing:border-box} html,body{overflow-x:hidden;width:100%}
    body{margin:0;min-height:100vh;color:var(--ink);font-family:Georgia,"Times New Roman",serif;background:linear-gradient(90deg,#111 0 10px,var(--paper) 10px)}
    .shell{width:min(1180px,100% - 20px);margin:auto;padding:10px 0}
    .variant-nav{display:flex;gap:6px;overflow:auto;margin-bottom:8px;font:700 11px "Segoe UI",Arial,sans-serif;text-transform:uppercase}
    .variant-nav a{color:#111;border:1px solid #111;padding:6px 8px;text-decoration:none;white-space:nowrap}.variant-nav a.active{background:#111;color:#fff}
    .masthead{display:grid;grid-template-columns:76px 1fr auto;gap:14px;align-items:center;border-bottom:3px double #111;padding:8px 0 12px}.logo{width:76px;height:48px;object-fit:contain}
    h1{margin:0;font-size:clamp(1.7rem,5vw,4rem);font-weight:400;line-height:.95}.tagline{margin:4px 0 0;font:700 .72rem "Segoe UI",Arial,sans-serif;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
    .call{font:800 .75rem "Segoe UI",Arial,sans-serif;color:#fff;background:#111;padding:8px 10px;text-decoration:none;white-space:nowrap}
    .menu-shell{height:calc(100svh - 132px);min-height:520px;background:#fffdf8;border:1px solid #111;display:flex;flex-direction:column;box-shadow:12px 12px 0 #111}
    .toolbar{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line);font-family:"Segoe UI",Arial,sans-serif}#pageTitle{margin:0;font-size:1rem}#pageMeta{color:var(--muted);font-size:.72rem;font-weight:700}
    .controls{display:flex;gap:8px}.controls button{width:36px;height:36px;border:1px solid #111;background:#fff;font-size:20px}
    .viewport{flex:1;overflow:hidden;touch-action:pan-y}.pages{display:flex;height:100%;transition:transform .42s cubic-bezier(.22,1,.36,1)}.menu-page{flex:0 0 100%;min-width:100%;overflow-y:auto}
    .page-strip{display:grid;grid-template-columns:44px minmax(0,1fr);gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line);background:#f0eadc}.page-strip>span{font-size:2rem;line-height:1}.page-strip h2{margin:0;font-size:1.15rem}.page-strip p{margin:2px 0 0;font:.72rem "Segoe UI",Arial,sans-serif;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .category-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px 34px;padding:18px}.category h3{margin:0 0 7px;font:900 .7rem "Segoe UI",Arial,sans-serif;letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid #111;padding-bottom:5px}
    .item{display:grid;grid-template-columns:minmax(0,1fr) 62px;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}.item.has-dual-price{grid-template-columns:1fr}.item h4{margin:0;font-size:.94rem;line-height:1.15}.item p{margin:3px 0 0;font:.7rem "Segoe UI",Arial,sans-serif;color:var(--muted);line-height:1.25}.item em{font:800 .55rem "Segoe UI",Arial,sans-serif;background:#111;color:#fff;padding:2px 5px}
    .prices{text-align:right;justify-self:end;font:900 .8rem "Segoe UI",Arial,sans-serif;white-space:nowrap}.prices span{display:block;color:var(--muted);font-size:.55rem}.prices.two-column{display:grid;grid-template-columns:1fr 1fr;width:min(172px,100%);border:1px solid #111;padding:4px}
    .dots{display:flex;justify-content:center;gap:7px;padding:9px;border-top:1px solid var(--line)}.dots button{width:8px;height:8px;border:1px solid #111;border-radius:50%;background:#fff}.dots button.active{width:28px;border-radius:99px;background:#111}
    @media(max-width:720px){body{background:var(--paper)}.masthead{grid-template-columns:54px 1fr auto}.logo{width:54px;height:36px}h1{font-size:1.25rem}.tagline{display:none}.menu-shell{height:calc(100svh - 114px);box-shadow:6px 6px 0 #111}.category-grid{grid-template-columns:1fr;padding:12px 18px 14px 12px}.item{grid-template-columns:minmax(0,1fr) 54px}.item h4{font-size:.82rem}.item p{font-size:.68rem}.item.has-dual-price{grid-template-columns:1fr}}
  </style>
</head>
<body><main class="shell"><nav class="variant-nav"><a href="index.html">Current</a><a href="concept-compact-luxe.html">Compact Luxe</a><a class="active" href="concept-editorial.html">Editorial</a><a href="concept-doodle-cafe.html">Doodles</a><a href="concept-night-card.html">Night Card</a><a href="concept-minimal-grid.html">Minimal Grid</a></nav><header class="masthead"><img class="logo" src="file.svg" alt="Third Place Brew"><div><h1>Third Place Brew</h1><p class="tagline">Editorial cafe menu concept</p></div><a class="call" href="tel:+910000000000">Call</a></header><section class="menu-shell"><div class="toolbar"><div><h2 id="pageTitle">Loading</h2><div id="pageMeta">Please wait</div></div><div class="controls"><button id="prevPage" type="button">&lsaquo;</button><button id="nextPage" type="button">&rsaquo;</button></div></div><div class="viewport" id="viewport"><div class="pages" id="pages"></div></div><div class="dots" id="dots"></div></section><span id="itemCount" hidden></span></main><script src="variant-menu.js"></script></body></html>
