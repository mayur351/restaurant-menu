<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Third Place Brew - Compact Luxe</title>
  <style>
    :root { --bg:#0b0b0b; --paper:#fbfaf6; --ink:#111; --muted:#666; --line:#dad7cf; --accent:#111; }
    * { box-sizing:border-box; }
    html, body { width:100%; overflow-x:hidden; }
    body { margin:0; min-height:100vh; font-family:"Segoe UI",Arial,sans-serif; color:var(--ink); background:#0b0b0b; }
    .shell { width:min(1180px,100% - 18px); margin:auto; padding:8px 0; }
    .variant-nav { display:flex; gap:6px; overflow:auto; padding:6px 0 8px; font-size:11px; text-transform:uppercase; }
    .variant-nav a { color:#fff; border:1px solid #444; padding:6px 8px; text-decoration:none; white-space:nowrap; }
    .variant-nav a.active { background:#fff; color:#000; }
    .masthead { display:grid; grid-template-columns:58px 1fr auto; gap:10px; align-items:center; color:#fff; padding:8px 0 12px; }
    .logo { width:58px; height:38px; object-fit:contain; filter:invert(1); }
    h1 { margin:0; font-size:clamp(1.15rem,4vw,2rem); letter-spacing:.02em; }
    .tagline { margin:2px 0 0; color:#bdbdbd; font-size:.72rem; }
    .call { color:#fff; border:1px solid #fff; padding:7px 9px; text-decoration:none; font-size:.72rem; font-weight:800; white-space:nowrap; }
    .menu-shell { height:calc(100svh - 112px); min-height:510px; display:flex; flex-direction:column; background:var(--paper); border:1px solid #2a2a2a; box-shadow:0 18px 70px rgba(0,0,0,.42); }
    .toolbar { min-height:46px; display:flex; justify-content:space-between; align-items:center; gap:10px; padding:8px 10px; border-bottom:1px solid var(--line); }
    #pageTitle { margin:0; font-size:1rem; }
    #pageMeta { color:var(--muted); font-size:.7rem; font-weight:700; }
    .controls { display:flex; gap:8px; }
    .controls button { width:34px; height:34px; border:1px solid #111; border-radius:50%; background:#fff; font-size:20px; }
    .viewport { flex:1; overflow:hidden; touch-action:pan-y; }
    .pages { display:flex; height:100%; transition:transform .42s cubic-bezier(.22,1,.36,1); }
    .menu-page { flex:0 0 100%; min-width:100%; overflow-y:auto; display:grid; grid-template-columns:minmax(0,1fr); }
    .page-strip { display:flex; gap:12px; align-items:center; padding:8px 10px; background:#111; color:#fff; }
    .page-strip > span { display:grid; place-items:center; width:34px; height:34px; border:1px solid #fff; border-radius:50%; font-weight:900; }
    .page-strip h2 { margin:0; font-size:.96rem; }
    .page-strip p { margin:2px 0 0; color:#cfcfcf; font-size:.68rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .category-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px 24px; padding:14px; }
    .category h3 { display:flex; gap:8px; align-items:center; margin:0 0 5px; font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; }
    .category h3:after { content:""; height:1px; background:var(--line); flex:1; }
    .item { display:grid; grid-template-columns:minmax(0,1fr) 58px; gap:8px; padding:5px 0; border-bottom:1px solid #e3e0d9; }
    .item.has-dual-price { grid-template-columns:1fr; }
    .item h4 { margin:0; font-size:.78rem; line-height:1.18; }
    .item p { margin:2px 0 0; color:var(--muted); font-size:.64rem; line-height:1.18; display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:2; overflow:hidden; }
    .item em { font-style:normal; background:#111; color:#fff; font-size:.55rem; padding:2px 5px; }
    .prices { justify-self:end; text-align:right; font-size:.76rem; font-weight:900; white-space:nowrap; }
    .prices span { display:block; color:#777; font-size:.5rem; text-transform:uppercase; }
    .prices.two-column { width:min(168px,100%); display:grid; grid-template-columns:1fr 1fr; gap:4px; padding:4px; border:1px solid var(--line); }
    .dots { display:flex; justify-content:center; gap:7px; padding:8px; border-top:1px solid var(--line); }
    .dots button { width:8px; height:8px; border:0; border-radius:50%; background:#aaa; }
    .dots button.active { width:28px; border-radius:99px; background:#111; }
    @media (max-width:720px){ .category-grid{grid-template-columns:1fr;padding:10px 16px 12px 10px}.tagline{display:none}.menu-shell{height:calc(100svh - 112px)} }
  </style>
</head>
<body>
  <main class="shell">
    <nav class="variant-nav"><a href="index.html">Current</a><a class="active" href="concept-compact-luxe.html">Compact Luxe</a><a href="concept-editorial.html">Editorial</a><a href="concept-doodle-cafe.html">Doodles</a><a href="concept-night-card.html">Night Card</a><a href="concept-minimal-grid.html">Minimal Grid</a></nav>
    <header class="masthead"><img class="logo" src="file.svg" alt="Third Place Brew"><div><h1>Third Place Brew</h1><p class="tagline">Compact premium menu for quick scanning.</p></div><a class="call" href="tel:+910000000000">Call</a></header>
    <section class="menu-shell"><div class="toolbar"><div><h2 id="pageTitle">Loading</h2><div id="pageMeta">Please wait</div></div><div class="controls"><button id="prevPage" type="button">&lsaquo;</button><button id="nextPage" type="button">&rsaquo;</button></div></div><div class="viewport" id="viewport"><div class="pages" id="pages"></div></div><div class="dots" id="dots"></div></section>
    <span id="itemCount" hidden></span>
  </main>
  <script src="variant-menu.js"></script>
</body>
</html>
