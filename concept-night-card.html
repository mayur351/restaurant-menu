<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Third Place Brew - Night Card</title>
  <style>
    :root{--bg:#080808;--card:#161616;--card2:#202020;--ink:#f7f7f2;--muted:#aaa;--line:#3a3a3a}
    *{box-sizing:border-box}html,body{width:100%;overflow-x:hidden}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#2a2a2a,#080808 48%);color:var(--ink);font-family:"Segoe UI",Arial,sans-serif}
    .shell{width:min(1180px,100% - 18px);margin:auto;padding:8px 0}.variant-nav{display:flex;gap:6px;overflow:auto;padding-bottom:8px;font-size:11px;font-weight:900;text-transform:uppercase}.variant-nav a{color:#ddd;border:1px solid #555;padding:6px 8px;text-decoration:none;white-space:nowrap}.variant-nav a.active{background:#fff;color:#000}
    .masthead{display:grid;grid-template-columns:70px 1fr auto;gap:12px;align-items:center;padding:12px 0}.logo{width:70px;height:44px;object-fit:contain;filter:invert(1)}h1{margin:0;font-size:clamp(1.35rem,4vw,2.8rem);font-weight:600}.tagline{margin:3px 0 0;color:var(--muted);font-size:.76rem}.call{color:#111;background:#fff;padding:8px 10px;text-decoration:none;font-weight:900;white-space:nowrap}
    .menu-shell{height:calc(100svh - 122px);min-height:520px;display:flex;flex-direction:column;background:linear-gradient(180deg,var(--card),#101010);border:1px solid #555;box-shadow:0 30px 90px rgba(0,0,0,.65)}.toolbar{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line);background:#0f0f0f}#pageTitle{margin:0;font-size:1rem}#pageMeta{color:var(--muted);font-size:.72rem;font-weight:800}.controls{display:flex;gap:8px}.controls button{width:36px;height:36px;border:1px solid #777;border-radius:50%;background:#191919;color:#fff;font-size:20px}
    .viewport{flex:1;overflow:hidden;touch-action:pan-y}.pages{display:flex;height:100%;transition:transform .42s cubic-bezier(.22,1,.36,1)}.menu-page{flex:0 0 100%;min-width:100%;overflow-y:auto}.page-strip{display:flex;gap:12px;align-items:center;padding:10px 12px;background:#fff;color:#111}.page-strip>span{display:grid;place-items:center;width:38px;height:38px;border:1px solid #111;border-radius:50%;font-weight:900}.page-strip h2{margin:0;font-size:1rem}.page-strip p{margin:2px 0 0;color:#555;font-size:.7rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .category-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 26px;padding:16px}.category{background:rgba(255,255,255,.035);border:1px solid var(--line);padding:10px}.category h3{margin:0 0 6px;color:#fff;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase}.item{display:grid;grid-template-columns:minmax(0,1fr) 60px;gap:8px;padding:7px 0;border-bottom:1px solid #303030}.item.has-dual-price{grid-template-columns:1fr}.item h4{margin:0;font-size:.86rem;color:#fff}.item p{margin:3px 0 0;color:var(--muted);font-size:.68rem;line-height:1.25}.item em{font-style:normal;border:1px solid #fff;padding:2px 5px;font-size:.55rem}.prices{text-align:right;justify-self:end;font-size:.78rem;font-weight:900}.prices span{display:block;color:#999;font-size:.52rem}.prices.two-column{display:grid;grid-template-columns:1fr 1fr;width:min(168px,100%);border:1px solid #555;padding:4px;background:#111}.dots{display:flex;justify-content:center;gap:8px;padding:9px;border-top:1px solid var(--line)}.dots button{width:8px;height:8px;border:0;border-radius:50%;background:#777}.dots button.active{width:30px;border-radius:99px;background:#fff}
    @media(max-width:720px){.masthead{grid-template-columns:52px 1fr auto}.logo{width:52px;height:34px}.tagline{display:none}h1{font-size:1.1rem}.menu-shell{height:calc(100svh - 112px)}.category-grid{grid-template-columns:1fr;padding:12px}.category{padding:8px}.item{grid-template-columns:minmax(0,1fr) 54px}.item.has-dual-price{grid-template-columns:1fr}.item h4{font-size:.8rem}.item p{font-size:.66rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}}
  </style>
</head>
<body><main class="shell"><nav class="variant-nav"><a href="index.html">Current</a><a href="concept-compact-luxe.html">Compact Luxe</a><a href="concept-editorial.html">Editorial</a><a href="concept-doodle-cafe.html">Doodles</a><a class="active" href="concept-night-card.html">Night Card</a><a href="concept-minimal-grid.html">Minimal Grid</a></nav><header class="masthead"><img class="logo" src="file.svg" alt="Third Place Brew"><div><h1>Third Place Brew</h1><p class="tagline">High contrast rich dark concept.</p></div><a class="call" href="tel:+910000000000">Call</a></header><section class="menu-shell"><div class="toolbar"><div><h2 id="pageTitle">Loading</h2><div id="pageMeta">Please wait</div></div><div class="controls"><button id="prevPage" type="button">&lsaquo;</button><button id="nextPage" type="button">&rsaquo;</button></div></div><div class="viewport" id="viewport"><div class="pages" id="pages"></div></div><div class="dots" id="dots"></div></section><span id="itemCount" hidden></span></main><script src="variant-menu.js"></script></body></html>
