<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Third Place Brew Menu</title>
  <style>
    :root {
      --paper: #f7f3ea;
      --surface: #fffdf8;
      --ink: #161616;
      --muted: #6f6a61;
      --line: #cfc7b8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI Light", "Segoe UI", Arial, sans-serif;
      background: linear-gradient(90deg, #111 0 10px, var(--paper) 10px);
    }

    .shell {
      width: min(1180px, 100% - 20px);
      margin: auto;
      padding: 10px 0;
    }

    .masthead {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 8px 0 12px;
      border-bottom: 3px double #111;
    }

    .logo {
      width: 104px;
      height: 66px;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 5vw, 4rem);
      font-weight: 300;
      line-height: 0.95;
    }

    .tagline {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .call {
      padding: 8px 10px;
      color: #fff;
      background: #111;
      font-weight: 300;
      text-decoration: none;
      white-space: nowrap;
    }

    .menu-shell {
      display: flex;
      flex-direction: column;
      height: calc(100svh - 118px);
      min-height: 520px;
      border: 1px solid #111;
      background: var(--surface);
      box-shadow: 12px 12px 0 #111;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 56px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    #pageTitle {
      margin: 0;
      font-family: "Segoe UI Light", "Segoe UI", Arial, sans-serif;
      font-size: 1rem;
      font-weight: 300;
    }

    #pageMeta {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 300;
    }

    .controls {
      display: flex;
      flex: 0 0 auto;
      gap: 8px;
    }

    .controls button {
      width: 36px;
      height: 36px;
      border: 1px solid #111;
      color: #111;
      background: #fff;
      font-family: "Segoe UI Light", "Segoe UI", Arial, sans-serif;
      font-size: 20px;
      font-weight: 300;
      cursor: pointer;
    }

    .controls button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .viewport {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      touch-action: pan-y;
      overscroll-behavior-x: contain;
    }

    .pages {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    .menu-page {
      flex: 0 0 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: auto minmax(0, 1fr);
      width: 100%;
      min-width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .page-strip {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      width: 100%;
      min-width: 0;
      padding: 10px 12px;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      background: #f0eadc;
    }

    .page-strip h2 {
      margin: 0;
      font-family: "Segoe UI Light", "Segoe UI", Arial, sans-serif;
      font-size: 1.2rem;
      font-weight: 300;
      line-height: 1.15;
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow: hidden;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px 34px;
      align-content: start;
      width: 100%;
      padding: 18px;
    }

    .category {
      min-width: 0;
    }

    .category h3 {
      margin: 0 0 7px;
      padding-bottom: 5px;
      border-bottom: 1px solid #111;
      font-family: "Segoe UI Light", "Segoe UI", Arial, sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 62px;
      gap: 10px;
      min-width: 0;
      padding: 7px 0;
      border-bottom: 1px solid var(--line);
    }

    .item.has-dual-price {
      grid-template-columns: 1fr;
    }

    .item-copy {
      min-width: 0;
      overflow: hidden;
    }

    .item h4 {
      margin: 0;
      font-family: "Segoe UI Light", "Segoe UI", Arial, sans-serif;
      font-size: 0.94rem;
      font-weight: 300;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .item p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 300;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .item em {
      padding: 2px 5px;
      color: #fff;
      background: #111;
      font-size: 0.55rem;
      font-style: normal;
      font-weight: 300;
    }

    .prices {
      justify-self: end;
      text-align: right;
      font-family: "Segoe UI Light", "Segoe UI", Arial, sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      white-space: nowrap;
    }

    .prices span {
      display: block;
      color: var(--muted);
      font-size: 0.55rem;
      font-weight: 300;
      text-transform: uppercase;
    }

    .prices strong {
      font-weight: 300;
    }

    .prices.two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: min(172px, 100%);
      padding: 4px;
      border: 1px solid #111;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 7px;
      padding: 9px;
      border-top: 1px solid var(--line);
    }

    .dots button {
      width: 8px;
      height: 8px;
      border: 1px solid #111;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }

    .dots button.active {
      width: 28px;
      border-radius: 99px;
      background: #111;
    }

    .message {
      padding: 34px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 720px) {
      body {
        background: var(--paper);
      }

      .masthead {
        grid-template-columns: 96px minmax(0, 1fr) auto;
        gap: 8px;
        padding: 8px 0 12px;
      }

      .logo {
        width: 96px;
        height: 60px;
      }

      h1 {
        display: none;
      }

      .tagline {
        display: none;
      }

      .menu-shell {
        height: calc(100svh - 100px);
        box-shadow: 6px 6px 0 #111;
      }

      .category-grid {
        grid-template-columns: 1fr;
        padding: 12px 18px 14px 12px;
      }

      .item {
        grid-template-columns: minmax(0, 1fr) 54px;
      }

      .item.has-dual-price {
        grid-template-columns: 1fr;
      }

      .item h4 {
        font-size: 0.82rem;
      }

      .item p {
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        font-size: 0.68rem;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="masthead">
      <img class="logo" src="file.svg" alt="Third Place Brew">
      <div>
        <h1>Third Place Brew</h1>
        <p class="tagline">Editorial cafe menu concept</p>
      </div>
      <a class="call" href="tel:+919372685137">Call</a>
    </header>

    <section class="menu-shell" aria-label="Third Place Brew menu">
      <div class="toolbar">
        <div>
          <h2 id="pageTitle">Loading</h2>
          <div id="pageMeta">Please wait</div>
        </div>
        <div class="controls">
          <button id="prevPage" type="button" aria-label="Previous page">&lsaquo;</button>
          <button id="nextPage" type="button" aria-label="Next page">&rsaquo;</button>
        </div>
      </div>

      <div class="viewport" id="viewport">
        <div class="pages" id="pages"></div>
      </div>

      <div class="dots" id="dots" aria-label="Menu page selector"></div>
    </section>
    <span id="itemCount" hidden></span>
  </main>

  <script>
    const API = "https://opensheet.elk.sh/1Ap-9y8Pu4uHO4q6UvA5r4kwJ9p0ic8vFN31sNYyRARs/Sheet1";

    const pagesEl = document.getElementById("pages");
    const dotsEl = document.getElementById("dots");
    const pageTitle = document.getElementById("pageTitle");
    const pageMeta = document.getElementById("pageMeta");
    const itemCount = document.getElementById("itemCount");
    const prevPage = document.getElementById("prevPage");
    const nextPage = document.getElementById("nextPage");
    const viewport = document.getElementById("viewport");

    let currentPage = 0;
    let pageData = [];
    let touchStartX = 0;

    const escapeHtml = (value) => String(value || "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#039;"
    }[char]));

    const truthy = (value) => ["TRUE", "YES", "1", "Y"].includes(String(value || "").trim().toUpperCase());
    const field = (row, names) => names.map((name) => row[name]).find((value) => String(value || "").trim() !== "") || "";
    const numberValue = (value, fallback) => {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    };
    const money = (value) => {
      if (String(value || "").trim() === "") return "";
      const number = Number(value);
      return Number.isFinite(number) ? `&#8377;${number}` : escapeHtml(value);
    };

    const fallbackPageTitles = {
      1: "Coffee Range",
      2: "Tea Range, Mocktails and Slushes",
      3: "House Shakes",
      4: "Salads, Sandwiches, Snacks & Pizza",
      5: "Meal Combos, Garlic bread & Pasta",
      6: "Wraps burgers & toast",
      7: "Desserts & waffles"
    };

    function normalizeRow(row, index) {
      const page = numberValue(field(row, ["page", "Page", "page_number", "Page Number"]), 1);
      const sortOrder = numberValue(field(row, ["sort_order", "Sort Order", "order", "id"]), index + 1);

      return {
        page,
        pageTitle: field(row, ["page_title", "Page Title", "page header", "Page Header"]) || fallbackPageTitles[page] || `Page ${page}`,
        sortOrder,
        category: field(row, ["category", "Category"]) || "House Specials",
        name: field(row, ["name", "Name", "item", "Item"]),
        description: field(row, ["description", "Description", "desc"]),
        priceLabel: field(row, ["price_label", "Price Label"]) || "Price",
        price: field(row, ["price", "Price"]),
        altPriceLabel: field(row, ["alt_price_label", "Alt Price Label", "secondary_label"]),
        altPrice: field(row, ["alt_price", "Alt Price", "secondary_price"]),
        seasonal: truthy(field(row, ["seasonal", "Seasonal"])),
        available: truthy(field(row, ["available", "Available"]))
      };
    }

    function renderPrices(item) {
      const primary = money(item.price);
      const secondary = money(item.altPrice);
      const primaryLabel = item.priceLabel && item.priceLabel.toLowerCase() !== "price" ? escapeHtml(item.priceLabel) : "";
      const secondaryLabel = item.altPriceLabel ? escapeHtml(item.altPriceLabel) : "";

      if (!primary && !secondary) return "";

      if (primary && secondary) {
        return `
          <div class="prices two-column">
            <div class="price-cell">${primaryLabel ? `<span>${primaryLabel}</span>` : ""}<strong>${primary}</strong></div>
            <div class="price-cell">${secondaryLabel ? `<span>${secondaryLabel}</span>` : ""}<strong>${secondary}</strong></div>
          </div>
        `;
      }

      return `<div class="prices"><div class="price-cell">${primaryLabel ? `<span>${primaryLabel}</span>` : ""}<strong>${primary || secondary}</strong></div></div>`;
    }

    function setPage(index) {
      if (!pageData.length) return;
      currentPage = Math.max(0, Math.min(index, pageData.length - 1));
      pagesEl.style.transform = `translateX(-${currentPage * 100}%)`;

      const active = pageData[currentPage];
      pageTitle.textContent = `Page ${active.page}`;
      pageMeta.textContent = `${active.itemCount} items / ${active.categories.length} sections`;
      prevPage.disabled = currentPage === 0;
      nextPage.disabled = currentPage === pageData.length - 1;

      [...dotsEl.children].forEach((dot, dotIndex) => {
        dot.classList.toggle("active", dotIndex === currentPage);
      });
    }

    function renderMenu(data) {
      const items = data
        .map(normalizeRow)
        .filter((item) => item.available && item.name)
        .sort((a, b) => a.page - b.page || a.sortOrder - b.sortOrder);

      const groupedPages = new Map();
      items.forEach((item) => {
        if (!groupedPages.has(item.page)) groupedPages.set(item.page, []);
        groupedPages.get(item.page).push(item);
      });

      pageData = [...groupedPages.entries()].map(([page, pageItems]) => {
        const categoryMap = new Map();
        pageItems.forEach((item) => {
          if (!categoryMap.has(item.category)) categoryMap.set(item.category, []);
          categoryMap.get(item.category).push(item);
        });

        return {
          page,
          title: pageItems.find((item) => item.pageTitle)?.pageTitle || fallbackPageTitles[page] || `Page ${page}`,
          itemCount: pageItems.length,
          categories: [...categoryMap.entries()].map(([category, categoryItems]) => ({ category, items: categoryItems }))
        };
      });

      pagesEl.innerHTML = pageData.map((menuPage) => `
        <article class="menu-page">
          <header class="page-strip">
            <h2>${escapeHtml(menuPage.title)}</h2>
          </header>
          <div class="category-grid">
            ${menuPage.categories.map((group) => `
              <section class="category">
                <h3>${escapeHtml(group.category)}</h3>
                ${group.items.map((item) => `
                  <div class="item ${item.price && item.altPrice ? "has-dual-price" : ""}">
                    <div class="item-copy">
                      <div class="item-name-row">
                        <h4>${escapeHtml(item.name)}</h4>
                        ${item.seasonal ? '<em>Seasonal</em>' : ""}
                      </div>
                      ${item.description ? `<p>${escapeHtml(item.description)}</p>` : ""}
                    </div>
                    ${renderPrices(item)}
                  </div>
                `).join("")}
              </section>
            `).join("")}
          </div>
        </article>
      `).join("");

      dotsEl.innerHTML = pageData.map((menuPage, index) => `<button type="button" aria-label="Open page ${menuPage.page}" data-index="${index}"></button>`).join("");
      dotsEl.querySelectorAll("button").forEach((dot) => dot.addEventListener("click", () => setPage(Number(dot.dataset.index))));
      itemCount.textContent = `${items.length} items`;
      setPage(0);
    }

    prevPage.addEventListener("click", () => setPage(currentPage - 1));
    nextPage.addEventListener("click", () => setPage(currentPage + 1));
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") setPage(currentPage - 1);
      if (event.key === "ArrowRight") setPage(currentPage + 1);
    });
    viewport.addEventListener("touchstart", (event) => {
      touchStartX = event.touches[0].clientX;
    }, { passive: true });
    viewport.addEventListener("touchend", (event) => {
      const delta = event.changedTouches[0].clientX - touchStartX;
      if (Math.abs(delta) > 48) setPage(currentPage + (delta < 0 ? 1 : -1));
    }, { passive: true });

    fetch(API)
      .then((res) => {
        if (!res.ok) throw new Error("Menu sheet failed to load");
        return res.json();
      })
      .then(renderMenu)
      .catch(() => {
        pageTitle.textContent = "Menu unavailable";
        pageMeta.textContent = "Check the linked sheet";
        pagesEl.innerHTML = '<div class="message">The live menu could not be loaded right now.</div>';
      });
  </script>
</body>
</html>
